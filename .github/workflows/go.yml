name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  release:
    types: [published]

jobs:
  #первый jobs
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: go mod tidy

      - name: Run tests
        run: go test ./... -v
  #второu jobs
  publish:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.NAME_1 }}
          password: ${{ secrets.NAME_2 }}

      - name: Extract tag
        id: meta
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: docker build -t ${{ secrets.NAME_1 }}/go-app:${{ steps.meta.outputs.TAG }} .

      - name: Push Docker image
        run: docker push ${{ secrets.NAME_1 }}/go-app:${{ steps.meta.outputs.TAG }}
