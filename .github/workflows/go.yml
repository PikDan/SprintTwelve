name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25" 

      - name: Install dependencies
        run: go mod tidy

      - name: Run tests
        run: go test ./... -v

  docker:
    name: Build Docker (PR only)
    runs-on: ubuntu-latest
    needs: test
    # Запускается и на PR, и на push в main / tags
    if: always()   # важно, чтобы не зависело от test (на случай если test skipped)

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'   # не логинимся в PR
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}   # push только не в PR
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/go-app:latest
            ${{ startsWith(github.ref, 'refs/tags/') && format('{0}/go-app:{1}', secrets.DOCKERHUB_USERNAME, github.ref_name) || '' }}
